# Reference: https://github.com/i3/i3/blob/next/etc/config

config-version = 2

# In i3, all workspaces are phantom
persistent-workspaces = []

start-at-login = true

after-startup-command = [
    'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0'
]

[workspace-to-monitor-force-assignment]
   1 = '^dell s34.*$'
   2 = '^dell s27.*$'
   3 = '^dell s34.*$'
   4 = '^dell s27.*$'
   5 = '^dell s34.*$'
   6 = '^dell s27.*$'
   7 = '^built-in.*$'
   8 = '^built-in.*$'
   9 = '^built-in.*$'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
    # cmd-h = [] # Disable "Hide application"
    # cmd-alt-h = [] # Disable "Hide others"


    # See: https://nikitabobko.github.io/AeroSpace/goodies#open-a-new-window-with-applescript
    alt-enter = '''exec-and-forget osascript -e '
    tell application "alacritty"
        do script
        activate
    end tell'
    '''

    # i3 wraps focus by default
    cmd-h =         'focus --boundaries-action wrap-around-the-workspace left --boundaries all-monitors-outer-frame'
    cmd-j =         'focus --boundaries-action wrap-around-the-workspace down --boundaries all-monitors-outer-frame'
    cmd-k =         'focus --boundaries-action wrap-around-the-workspace up --boundaries all-monitors-outer-frame'
    cmd-l =         'focus --boundaries-action wrap-around-the-workspace right --boundaries all-monitors-outer-frame'

    cmd-shift-h = 'move left'
    cmd-shift-j = 'move down'
    cmd-shift-k = 'move up'
    cmd-shift-l = 'move right'

    # Consider using 'join-with' command as a 'split' replacement if you want to enable
    # normalizations
    # alt-h = 'split horizontal'
    # alt-v = 'split vertical'

    cmd-f = 'fullscreen'

    # cmd-s = 'layout v_accordion' # 'layout stacking' in i3
    # cmd-w = 'layout h_accordion' # 'layout tabbed' in i3
    # cmd-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

    cmd-shift-space = 'layout floating tiling' # 'floating toggle' in i3

    # Not supported, because this command is redundant in AeroSpace mental model.
    # See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
    #alt-space = 'focus toggle_tiling_floating'

    # `focus parent`/`focus child` are not yet supported, and it's not clear whether they
    # should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
    # alt-a = 'focus parent'

    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'
    cmd-6 = 'workspace 6'
    cmd-7 = 'workspace 7'
    cmd-8 = 'workspace 8'
    cmd-9 = 'workspace 9'

    cmd-shift-1 = 'move-node-to-workspace 1'
    cmd-shift-2 = 'move-node-to-workspace 2'
    cmd-shift-3 = 'move-node-to-workspace 3'
    cmd-shift-4 = 'move-node-to-workspace 4'
    cmd-shift-5 = 'move-node-to-workspace 5'
    cmd-shift-6 = 'move-node-to-workspace 6'
    cmd-shift-7 = 'move-node-to-workspace 7'
    cmd-shift-8 = 'move-node-to-workspace 8'
    cmd-shift-9 = 'move-node-to-workspace 9'

    cmd-shift-c = 'reload-config'

    cmd-r = 'mode resize'

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

[[on-window-detected]]
    if.app-name-regex-substring = "Slack"
    run = ["move-node-to-workspace 9"]

[[on-window-detected]]
    if.app-name-regex-substring = "Telegram"
    run = ["move-node-to-workspace 9"]

[[on-window-detected]]
    if.app-name-regex-substring = "Spotify"
    run = ["move-node-to-workspace 8"]

[[on-window-detected]]
    if.app-name-regex-substring = "Pages"
    run = ["move-node-to-workspace 7"]

[[on-window-detected]]
    if.app-name-regex-substring = "Linear"
    run = ["move-node-to-workspace 4"]

[[on-window-detected]]
    if.app-name-regex-substring = "Notion"
    run = ["move-node-to-workspace 6"]

[[on-window-detected]]
    if.app-name-regex-substring = "Zen"
    run = ["move-node-to-workspace 2"]
