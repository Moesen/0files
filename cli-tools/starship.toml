"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha_muted"

add_newline = false
scan_timeout = 10

format = "$directory$git_branch$git_status$character"
right_format = "$aws$nodejs$python$rust$golang$package$cmd_duration$status"

[palettes.catppuccin_mocha_muted]
text = "#cdd6f4"
subtext0 = "#a6adc8"
overlay0 = "#6c7086"
surface1 = "#45475a"
surface2 = "#585b70"
blue = "#89b4fa"
green = "#a6e3a1"
yellow = "#f9e2af"
peach = "#fab387"
red = "#f38ba8"

[directory]
style = "fg:text"
truncation_length = 3
truncate_to_repo = false
repo_root_style = "bold fg:blue"
before_repo_root_style = "fg:overlay0"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style) "
read_only = " ro"
read_only_style = "fg:red"

[git_branch]
symbol = "git "
style = "fg:subtext0"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "*"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[aws]
symbol = "aws "
style = "fg:peach"
format = "[$symbol$profile($region)]($style) "

[nodejs]
symbol = "node "
style = "fg:green"
format = "[$symbol$version]($style) "

[python]
symbol = "py "
style = "fg:green"
format = "[$symbol$version]($style) "

[rust]
symbol = "rs "
style = "fg:peach"
format = "[$symbol$version]($style) "

[golang]
symbol = "go "
style = "fg:blue"
format = "[$symbol$version]($style) "

[package]
symbol = "pkg "
style = "fg:surface2"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = "[took $duration]($style) "

[status]
disabled = false
style = "fg:red"
symbol = "x "
success_symbol = ""
format = "[$symbol$status]($style) "
map_symbol = true

[character]
success_symbol = "[❯](bold fg:surface2)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:blue)"
