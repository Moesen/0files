[window]
padding = { x = 0, y = 0 }
option_as_alt = "Both"

[font]
normal = { family = "MesloLGL Nerd Font", style = "Regular" }
bold = { family = "MesloLGL Nerd Font", style = "Bold" }
italic = { family = "MesloLGL Nerd Font", style = "Italic" }
bold_italic = { family = "MesloLGL Nerd Font", style = "Bold Italic" }
size = 13

[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Beam", blinking = "On" }

[general]
live_config_reload = true
import = ["~/.config/alacritty/themes/catppuccin/catppuccin-mocha.toml"]

# Place below in /etc/fonts/local.conf to disable antialiasing
